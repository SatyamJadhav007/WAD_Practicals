<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f4f6f9;
      }
      aside {
        min-height: 100vh;
        background: #212529;
      }
      aside a {
        color: white;
        display: block;
        padding: 10px;
        text-decoration: none;
      }
      aside a:hover {
        background: #343a40;
      }
    </style>
  </head>
  <body>
    <header class="bg-dark text-white text-center p-3">
      <h4>Admin Dashboard</h4>
      <!-- 🔹 NEW: Toggle Button -->
      <button class="btn btn-light mt-2" onclick="toggleSidebar()">
        Toggle Sidebar
      </button>
    </header>
    <section class="container-fluid">
      <section class="row">
        <!-- Sidebar -->
        <aside class="col-md-2" id="sidebar">
          <nav>
            <a href="#">Dashboard</a>
            <a href="#">Students</a>
            <a href="#">Exams</a>
          </nav>
        </aside>
        <!-- Main -->
        <main class="col-md-10 p-4">
          <h3>Dashboard</h3>
          <!-- 🔹 Cards container -->
          <section class="row" id="cardContainer"></section>
        </main>
      </section>
    </section>
    <script>
      // 🔷 1. Dynamic Data Array (NEW)
      let stats = [
        { title: "Students", value: 1200 },
        { title: "Exams", value: 45 },
        { title: "Results", value: 30 },
        { title: "Users", value: 300 },
      ];
      // 🔷 2. Function to Render Cards (NEW)
      function displayCards() {
        let container = document.getElementById("cardContainer");
        container.innerHTML = "";
        stats.forEach(function (item) {
          let card = `
<div class="col-md-3 mb-3">
<div class="card text-bg-primary">
<div class="card-body">
<h6>${item.title}</h6>
<h4>${item.value}</h4>
</div>
</div>
</div>
`;
          container.innerHTML += card;
        });
      }
      // 🔷 3. Sidebar Toggle Function (NEW)
      function toggleSidebar() {
        let sidebar = document.getElementById("sidebar");
        if (sidebar.style.display === "none") {
          sidebar.style.display = "block";
        } else {
          sidebar.style.display = "none";
        }
      }
      // 🔷 Call function on load
      displayCards();
    </script>
  </body>
</html>

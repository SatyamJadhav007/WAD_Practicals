<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        color: white;
      }
      aside {
        min-height: 100vh;
        background: black;
      }
      aside a {
        color: white;
        display: block;
        text-decoration: none;
        padding: 10px;
      }
      aside a:hover {
        background: white;
      }
    </style>
  </head>
  <body>
    <header class="bg-dark text-white text-center p-4">
      <h3>Admin Dashboard</h3>
      <button class="btn btn-light mt-2" onclick="toogleSidebar()">
        Toogle SideBar
      </button>
    </header>
    <section class="container-fluid">
      <section class="row">
        <aside class="col-md-2" id="sidebar">
          <nav>
            <a href="#">Dashboard</a>
            <a href="#"> Students </a>
            <a href="#">Exams</a>
          </nav>
        </aside>
        <main class="col-md-10 p-4">
          <h3>Dashboard</h3>
          <section class="row" id="cardContainer"></section>
        </main>
      </section>
    </section>
    <script>
      let stats = [
        { title: "Students", value: 1200 },
        { title: "Exams", value: 45 },
        { title: "Results", value: 30 },
        { title: "Users", value: 22 },
      ];

      function displayCards() {
        const cardContainer = document.getElementById("cardContainer");
        cardContainer.innerHTML = "";

        stats.forEach(function (obj) {
          let card = `
<div class="col-md-3 mb-3">
<div class="card text-bg-primary">
<div class="card-body">
<h6>${obj.title}</h6>
<h4>${obj.value}</h4>
</div>
</div>
</div>
`;
          cardContainer.innerHTML += card;
        });
      }
      function toogleSidebar() {
        let sidebar = document.getElementById("sidebar");
        if (sidebar.style.display === "none") {
          sidebar.style.display = "block";
        } else {
          sidebar.style.display = "none";
        }
      }
      displayCards();
    </script>
  </body>
</html>
